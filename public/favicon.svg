<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="nookFillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="leafGradient" x1="192" y1="184" x2="320" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8B5CF6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g transform="translate(256, 256) scale(1.3) translate(-256, -256)">
    <!-- Nook -->
    <path
      d="M 144 80 L 317 80 C 380.51 80 432 131.49 432 195 L 432 368"
      fill="url(#nookFillGradient)"
      stroke="url(#nookGradient)"
      stroke-width="40"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#shadow)"
    />

    <g transform="translate(256, 256) scale(1.2) translate(-256, -256)">
      <!-- Stem -->
      <path
        d="M256 336V228"
        stroke="url(#leafGradient)"
        stroke-width="28"
        stroke-linecap="round"
      />

      <!-- Left Leaf -->
      <path
        d="M256 248C220 248 192 220 192 184C228 184 256 212 256 248Z"
        fill="url(#leafGradient)"
      />

      <!-- Right Leaf -->
      <path
        d="M256 248C292 248 320 220 320 184C284 184 256 212 256 248Z"
        fill="url(#leafGradient)"
      />
    </g>
  </g>
</svg>